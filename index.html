<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiling Cat</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            flex-direction: column;
        }
        img {
            max-width: 80%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        img:hover {
            transform: scale(1.05);
        }
        h1 {
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <img src="https://cataas.com/cat/says/Smile!" alt="Smiling Cat">
    <h1>Have a great day!</h1>
</body>
</html>
